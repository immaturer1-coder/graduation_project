services:
  db:
    image: postgres:15
    volumes:
      - ./tmp/db:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: password
  web:
    build:
      context: .
      args:
        USER_UID: 1000
        USER_GID: 1000
    command: >
      bash -c "
      rm -f tmp/pids/server.pid &&
      if [ ! -d 'node_modules' ]; then
        npm install &&
        npm install @hotwired/turbo-rails @hotwired/stimulus esbuild tailwindcss @tailwindcss/cli --save
      fi &&
      bundle exec rails s -p 3000 -b '0.0.0.0'
      "
    volumes:
      - .:/app
    # ports: # ホストへの直接公開は不要（Nginx経由にするため）
    #   - "3000:3000"
    environment:
      POSTGRES_PASSWORD: password
    depends_on:
      - db

  proxy:
    image: nginx:alpine
    ports:
      - "443:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web