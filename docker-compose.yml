services:
  db:
    image: postgres:15
    volumes:
      - ./tmp/db:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: password
  web:
    build: .
    # サーバー起動前に古いPIDファイルを削除するコマンド
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails s -p 3000 -b '0.0.0.0'"
    volumes:
      - .:/app
    ports:
      - "3000:3000"
    environment:
      # データベース接続用のパスワード。ユーザー名はデフォルトの postgres を使用
      POSTGRES_PASSWORD: password
    depends_on:
      - db